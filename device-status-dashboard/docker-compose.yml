version: '3.8'

services:
  backend:
    build: ./backend
    container_name: dashboard-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/data:/app/data
    restart: always

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_WS_URL: "ws://status.vayki.com:8080" 
    container_name: dashboard-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
