<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Monitor (macOS) -->
  <rect x="8" y="12" width="28" height="20" rx="3" fill="none" stroke="url(#blue)" stroke-width="2.5"/>
  <line x1="16" y1="32" x2="28" y2="32" stroke="url(#blue)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="32" x2="22" y2="37" stroke="url(#blue)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="37" x2="28" y2="37" stroke="url(#blue)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Phone (Android) -->
  <rect x="40" y="16" width="16" height="28" rx="3" fill="none" stroke="url(#green)" stroke-width="2.5"/>
  <line x1="46" y1="40" x2="50" y2="40" stroke="url(#green)" stroke-width="2" stroke-linecap="round"/>
  <!-- Signal dots -->
  <circle cx="16" cy="50" r="2.5" fill="#3b82f6" opacity="0.8"/>
  <circle cx="26" cy="50" r="2.5" fill="#8b5cf6" opacity="0.8"/>
  <circle cx="36" cy="50" r="2.5" fill="#10b981" opacity="0.8"/>
  <circle cx="46" cy="50" r="2.5" fill="#f59e0b" opacity="0.8"/>
</svg>
