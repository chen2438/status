version: '3.8'

services:
  caddy:
    image: caddy:2-alpine
    container_name: dashboard-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  backend:
    build: ./backend
    container_name: dashboard-backend
    volumes:
      - ./backend/data:/app/data
    restart: always

  frontend:
    build: 
      context: ./frontend
      args:
        VITE_WS_URL: "wss://status.vayki.com/ws" 
    container_name: dashboard-frontend
    restart: always
    depends_on:
      - backend

volumes:
  caddy_data:
  caddy_config:
